name: Scrape Jobs To Supabase

on:
  schedule:
    # 08:00 y 20:00 hora de Lima (UTC-5)
    - cron: "0 13 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  scrape-and-upsert:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build scraper image
        run: docker build -f Dockerfile.scraper -t extract-empleos:ci .

      - name: Run scraper container
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUN_SCRAPER_1: "false"
          RUN_SCRAPER_2: "true"
          PERSIST_LOCAL_OUTPUTS: "false"
          UPSERT_CHUNK_SIZE: "500"
        run: |
          docker run --rm \
            -e SUPABASE_URL \
            -e SUPABASE_SERVICE_ROLE_KEY \
            -e RUN_SCRAPER_1 \
            -e RUN_SCRAPER_2 \
            -e PERSIST_LOCAL_OUTPUTS \
            -e UPSERT_CHUNK_SIZE \
            extract-empleos:ci \
            /app/run_scrapers.sh
